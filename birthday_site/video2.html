
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>🎁 Birthday Video 2</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <div class="card">
      <h1>one more ✨</h1>
      <p class="lead">Before your letter, here's something I wanted to say.</p>
      <video controls preload="metadata" width="100%" crossorigin="anonymous">
        <source src="https://drive.google.com/uc?export=download&id=1mHztTZwB6jxch92pOi81Y8cbwxQ3FGbW" type="video/mp4" />
        Your browser does not support the video tag.
      </video>
      <div class="nav" style="margin-top:16px;">
        <a class="button" href="letter.html">open birthday letter 💌</a>
      </div>
    </div>
  </main>
  <script>(function(){
// Minimal confetti using canvas (no dependencies)
(function(){
  const duration = 1600;
  const end = Date.now() + duration;
  const colors = ["#ff6aa5","#f59e0b","#8b5cf6","#10b981","#3b82f6"];
  const canvas = document.createElement('canvas');
  canvas.id = 'confetti-canvas';
  document.body.appendChild(canvas);
  const ctx = canvas.getContext('2d');
  function resize(){ canvas.width = innerWidth; canvas.height = innerHeight; }
  addEventListener('resize', resize); resize();

  const pieces = Array.from({length: 140}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * -canvas.height,
    r: 4 + Math.random() * 6,
    c: colors[Math.floor(Math.random()*colors.length)],
    s: 2 + Math.random() * 4,
    a: Math.random() * 360
  }));

  const tick = () => {
    const t = Date.now();
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p => {
      p.y += p.s;
      p.x += Math.sin((p.y + p.a) * 0.02) * 1.5;
      ctx.fillStyle = p.c;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fill();
      if (p.y > canvas.height + 8) { p.y = -10; p.x = Math.random()*canvas.width; }
    });
    if (t < end) requestAnimationFrame(tick);
    else setTimeout(()=>canvas.remove(), 250);
  };
  tick();
})();
})();</script>
</body>
</html>
