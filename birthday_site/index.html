  <script>
    function fireConfetti(){ 
// Minimal confetti using canvas (no dependencies)
(function(){
  const duration = 1600;
  const end = Date.now() + duration;
  const colors = ["#ff6aa5","#f59e0b","#8b5cf6","#10b981","#3b82f6"];
  const canvas = document.createElement('canvas');
  canvas.id = 'confetti-canvas';
  document.body.appendChild(canvas);
  const ctx = canvas.getContext('2d');
  function resize(){ canvas.width = innerWidth; canvas.height = innerHeight; }
  addEventListener('resize', resize); resize();

  const pieces = Array.from({length: 140}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * -canvas.height,
    r: 4 + Math.random() * 6,
    c: colors[Math.floor(Math.random()*colors.length)],
    s: 2 + Math.random() * 4,
    a: Math.random() * 360
  }));

  const tick = () => {
    const t = Date.now();
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p => {
      p.y += p.s;
      p.x += Math.sin((p.y + p.a) * 0.02) * 1.5;
      ctx.fillStyle = p.c;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fill();
      if (p.y > canvas.height + 8) { p.y = -10; p.x = Math.random()*canvas.width; }
    });
    if (t < end) requestAnimationFrame(tick);
    else setTimeout(()=>canvas.remove(), 250);
  };
  tick();
})();
 }
  </script>
